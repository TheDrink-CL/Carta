<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE DRINK // CARTA 2026</title>
<style>
  :root { color-scheme: light; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes scanlines {
    0% { transform: translateY(0); }
    100% { transform: translateY(4px); }
  }
  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
      opacity: 1;
      text-shadow: 0 0 4px currentColor, 0 0 11px currentColor, 0 0 19px currentColor;
    }
    20%, 24%, 55% { opacity: 0.85; text-shadow: none; }
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 8px #ff00ff44, inset 0 0 8px #ff00ff22; }
    50% { box-shadow: 0 0 24px #ff00ff88, inset 0 0 16px #ff00ff44; }
  }
  @keyframes glitch-shift {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-1px, 1px); }
    40% { transform: translate(-1px, -1px); }
    60% { transform: translate(1px, 1px); }
    80% { transform: translate(1px, -1px); }
  }
  @keyframes grid-drift {
    0% { background-position: 0 0; }
    100% { background-position: 50px 50px; }
  }
  @keyframes neon-sweep {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  html, body {
    background: #05000f;
    color: #f0f0ff;
    font-family: 'Courier New', 'Consolas', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fondo grid cyberpunk */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 0, 255, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: grid-drift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255, 0, 255, 0.025) 2px,
      rgba(255, 0, 255, 0.025) 4px
    );
    pointer-events: none;
    z-index: 1000;
    mix-blend-mode: screen;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 24px 0 20px;
    border-bottom: 1px solid #ff00ff33;
    margin-bottom: 32px;
    position: relative;
  }
  .header::before {
    content: '[ SYS://THE_DRINK.exe — STATUS: ONLINE ]';
    display: block;
    color: #00ffff;
    font-size: 11px;
    letter-spacing: 4px;
    margin-bottom: 16px;
    text-shadow: 0 0 6px #00ffff;
    opacity: 0.7;
  }
  .logo-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 8px;
    position: relative;
    overflow: visible;
  }
  .logo-wrap::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: min(220px, 45vw);
    height: 2px;
    background: linear-gradient(90deg, transparent, #00ffff, transparent);
    box-shadow: 0 0 8px #00ffff;
    opacity: 0.6;
    animation: scan-line 4s linear infinite;
    pointer-events: none;
    z-index: 2;
  }
  .logo-wrap::before {
    content: '';
    position: absolute;
    inset: -30px;
    background: radial-gradient(circle, #ff00ff22 0%, #00ffff11 40%, transparent 70%);
    filter: blur(28px);
    z-index: -1;
    animation: glow-pulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  .logo-img {
    max-width: min(220px, 45vw);
    width: 100%;
    height: auto;
    display: block;
    animation: logo-breathe 3.5s ease-in-out infinite;
    filter:
      drop-shadow(0 0 8px #ff00ff66)
      drop-shadow(0 0 16px #ff00ff33);
  }
  .header .sub {
    margin-top: 16px;
    color: #00ffff;
    font-size: 14px;
    letter-spacing: 8px;
    text-shadow: 0 0 8px #00ffff;
  }
  .header .meta {
    margin-top: 12px;
    color: #ff00ff99;
    font-size: 11px;
    letter-spacing: 2px;
  }

  /* SECTION TITLES */
  .section {
    margin-top: 56px;
  }
  .section-title {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    font-size: 22px;
    letter-spacing: 6px;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff;
    text-transform: uppercase;
  }
  .section-title::before {
    content: '//';
    color: #ff00ff;
    text-shadow: 0 0 8px #ff00ff;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, #00ffff, transparent);
    box-shadow: 0 0 6px #00ffff;
  }

  /* HERO PREMIUM */
  .hero {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }
  .hero-card {
    position: relative;
    background: linear-gradient(135deg, #1a0033cc, #000022cc);
    border: 2px solid #ff00ff;
    padding: 28px;
    overflow: hidden;
    animation: glow-pulse 3s ease-in-out infinite;
  }
  .hero-card::before {
    content: '★ LANZAMIENTO';
    position: absolute;
    top: 12px;
    right: 12px;
    color: #ffea00;
    font-size: 10px;
    letter-spacing: 3px;
    text-shadow: 0 0 8px #ffea00;
    padding: 4px 8px;
    border: 1px solid #ffea00;
    background: rgba(255, 234, 0, 0.08);
    animation: flicker 3s infinite;
  }

  /* GRID DE CARDS */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    position: relative;
    background: rgba(15, 0, 30, 0.7);
    border: 1px solid #ff00ff66;
    padding: 0;
    overflow: hidden;
    transition: all 0.25s ease;
    backdrop-filter: blur(4px);
  }
  .card:hover {
    border-color: #00ffff;
    box-shadow: 0 0 20px #00ffff66, inset 0 0 12px #00ffff22;
    transform: translateY(-2px);
  }
  .card .ph {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    background:
      linear-gradient(135deg, #2a0044, #001133);
    overflow: hidden;
    border-bottom: 1px solid #ff00ff44;
    cursor: pointer;
  }
  .card .ph::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 0, 255, 0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 255, 0.15) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .card .ph .empty-msg {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ff00ffaa;
    font-size: 11px;
    letter-spacing: 2px;
    text-align: center;
    padding: 12px;
    text-shadow: 0 0 6px #ff00ff;
    pointer-events: none;
  }
  .card .ph .empty-msg .icon {
    font-size: 32px;
    margin-bottom: 8px;
    color: #00ffff;
    text-shadow: 0 0 10px #00ffff;
  }
  .card .ph img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(1.15) contrast(1.05);
  }
  .card .ph .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(5, 0, 15, 0.85));
    pointer-events: none;
  }
  .card .ph .hover-hint {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0, 0, 0, 0.7);
    color: #00ffff;
    font-size: 10px;
    padding: 4px 8px;
    border: 1px solid #00ffff66;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover .hover-hint { opacity: 1; }
  .card .ph .remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0, 0, 0, 0.7);
    color: #ff00ff;
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid #ff00ff;
    cursor: pointer;
    display: none;
    letter-spacing: 1px;
  }
  .card .ph:has(img) .remove-btn { display: block; }
  .card .ph:has(img) .empty-msg { display: none; }

  .card .body {
    padding: 16px 16px 18px;
  }
  .card h3 {
    font-size: 18px;
    color: #ff00ff;
    text-shadow: 0 0 6px #ff00ff;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .card .id {
    font-size: 10px;
    color: #00ffff99;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .card .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #ff00ff33;
  }
  .card .price {
    font-size: 22px;
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .card .price .clp {
    font-size: 11px;
    color: #00ffff99;
    margin-right: 2px;
  }
  .card .size {
    font-size: 11px;
    color: #ff00ffaa;
    letter-spacing: 2px;
  }
  .card .addons {
    margin-top: 10px;
    font-size: 10px;
    color: #ffea00;
    text-shadow: 0 0 6px #ffea00aa;
    letter-spacing: 1px;
    padding: 6px 8px;
    border: 1px dashed #ffea0066;
    background: #ffea0011;
  }

  /* HERO CARD overrides */
  .hero-card h3 {
    font-size: 28px;
    color: #ff00ff;
    text-shadow:
      0 0 8px #ff00ff,
      0 0 16px #ff00ff;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .hero-card .price {
    font-size: 32px;
  }
  .hero-card .ph {
    aspect-ratio: 16 / 9;
    margin-bottom: 16px;
  }

  /* FOOTER */
  .footer {
    margin-top: 72px;
    padding-top: 32px;
    border-top: 1px solid #ff00ff33;
    text-align: center;
    color: #ff00ff77;
    font-size: 11px;
    letter-spacing: 3px;
  }
  .footer .blink {
    display: inline-block;
    animation: flicker 2s infinite;
    color: #00ffff;
    text-shadow: 0 0 6px #00ffff;
  }

  /* CONTROL BAR */
  .controls {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .controls button {
    background: rgba(5, 0, 15, 0.9);
    border: 1px solid #00ffff66;
    color: #00ffff;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 12px;
    cursor: pointer;
    text-shadow: 0 0 4px #00ffff;
    transition: all 0.2s;
  }
  .controls button:hover {
    border-color: #00ffff;
    box-shadow: 0 0 10px #00ffff66;
    background: rgba(0, 255, 255, 0.1);
  }

  /* MODAL DE SUBIDA */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(5, 0, 15, 0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(8px);
  }
  .modal-bg.active { display: flex; }
  .modal {
    background: linear-gradient(135deg, #1a0033, #000022);
    border: 2px solid #ff00ff;
    padding: 32px;
    max-width: 500px;
    width: 90%;
    box-shadow: 0 0 40px #ff00ff66;
  }
  .modal h2 {
    color: #00ffff;
    text-shadow: 0 0 8px #00ffff;
    letter-spacing: 3px;
    font-size: 18px;
    margin-bottom: 8px;
  }
  .modal .target {
    color: #ff00ff;
    text-shadow: 0 0 6px #ff00ff;
    font-size: 14px;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .modal input[type="file"] {
    display: none;
  }
  .modal .filebtn {
    display: block;
    width: 100%;
    padding: 24px;
    border: 2px dashed #00ffff66;
    background: rgba(0, 255, 255, 0.05);
    color: #00ffff;
    text-align: center;
    cursor: pointer;
    letter-spacing: 3px;
    font-size: 13px;
    text-shadow: 0 0 6px #00ffff;
    transition: all 0.2s;
  }
  .modal .filebtn:hover {
    border-color: #00ffff;
    background: rgba(0, 255, 255, 0.1);
    box-shadow: inset 0 0 20px #00ffff33;
  }
  .modal .actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .modal .actions button {
    flex: 1;
    background: transparent;
    border: 1px solid #ff00ff66;
    color: #ff00ff;
    font-family: inherit;
    padding: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    font-size: 11px;
    text-shadow: 0 0 4px #ff00ff;
  }
  .modal .actions button:hover {
    border-color: #ff00ff;
    box-shadow: 0 0 10px #ff00ff66;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(5, 0, 15, 0.95);
    border: 1px solid #00ffff;
    color: #00ffff;
    padding: 12px 24px;
    letter-spacing: 3px;
    font-size: 12px;
    text-shadow: 0 0 6px #00ffff;
    box-shadow: 0 0 20px #00ffff66;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    .header h1 { letter-spacing: -1px; }
    .controls { top: 8px; right: 8px; }
    .controls button { padding: 6px 8px; font-size: 9px; }
  }

  /* Badge NUEVO para cards normales */
  .card.is-new { border-color: #00ffff66; }
  .card.is-new::before {
    content: '★ NUEVO';
    position: absolute;
    top: 10px;
    right: 10px;
    color: #00ffff;
    font-size: 9px;
    letter-spacing: 2px;
    text-shadow: 0 0 6px #00ffff;
    padding: 3px 7px;
    border: 1px solid #00ffff88;
    background: rgba(0, 255, 255, 0.08);
    z-index: 2;
    pointer-events: none;
  }


  /* Descriptor de ingredientes */
  .desc {
    margin-top: 6px;
    font-size: 11px;
    color: #00ffffcc;
    letter-spacing: 1px;
    line-height: 1.4;
    text-shadow: 0 0 4px #00ffff66;
    opacity: 0.92;
  }
  .hero-card .desc {
    font-size: 13px;
    margin-top: 8px;
    margin-bottom: 4px;
  }

  /* === LOGO PULSE CYBERPUNK 2077 === */
  @keyframes logo-breathe {
    0%, 100% {
      filter:
        drop-shadow(0 0 6px #ff00ff55)
        drop-shadow(0 0 14px #ff00ff33)
        drop-shadow(0 0 4px #00ffff44);
      transform: scale(1);
    }
    50% {
      filter:
        drop-shadow(0 0 12px #ff00ffaa)
        drop-shadow(0 0 28px #ff00ff66)
        drop-shadow(0 0 8px #00ffff88);
      transform: scale(1.02);
    }
  }
  @keyframes chroma-shift {
    0%, 90%, 100% { transform: translate(0); opacity: 0; }
    91% { transform: translate(-2px, 0); opacity: 0.6; }
    93% { transform: translate(2px, 0); opacity: 0.6; }
    95% { transform: translate(-1px, 1px); opacity: 0.4; }
    97% { transform: translate(0, 0); opacity: 0; }
  }
  @keyframes scan-line {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(200%); }
  }

</style>
</head>

  const DESCRIPTORS = {1: "Ron · coco · piña · curaçao", 2: "Ron · frambuesa · lima", 3: "Ron · frutilla · lima", 4: "Ron · mango · lima", 5: "Ron · maracuyá · lima", 7: "Ron · crema de coco · frutilla", 8: "Ron · crema de coco · mango", 9: "Ron · menta fresca · lima", 10: "Ron · menta · coco · curaçao", 11: "Ron · menta · frambuesa", 12: "Ron · menta · frambuesa · crema de coco", 13: "Ron · menta · frutilla", 14: "Ron · menta · mango", 15: "Ron · menta · maracuyá", 16: "Ron · menta · piña", 17: "Ron · crema de coco · piña", 20: "Gin · maracuyá · Red Bull Yellow", 21: "Gin · frambuesa · Red Bull Blue", 23: "Pisco · lima · goma", 24: "Pisco · mango · lima"};
  const STORAGE_KEY = "the_drink_photos_v1";

  function loadPhotos() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    } catch { return {}; }
  }
  function savePhotos(photos) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(photos));
  }
  let photos = loadPhotos();

  function fmtCLP(n) {
    return n.toLocaleString("es-CL");
  }

  function cardHTML(r, hero = false) {
    const photo = photos[r.id];
    const incluyeHTML = r.incluye
      ? `<div class="addons">▶ ${r.incluye.toUpperCase()}</div>`
      : '';
    const photoBlock = photo
      ? `<div class="ph"><img src="${photo}" alt="${r.nombre}"><div class="photo-overlay"></div></div>`
      : '';
    return `
      <article class="${hero ? 'hero-card' : 'card'}${!hero && r.cat === 'sours' ? ' is-new' : ''}" data-id="${r.id}">
        ${photoBlock}
        <div class="body">
          <h3>${r.nombre.toUpperCase()}</h3>
          ${DESCRIPTORS[r.id] ? `<div class="desc">${DESCRIPTORS[r.id]}</div>` : ''}
          <div class="row">
            <div class="price"><span class="clp">CLP</span>$${fmtCLP(r.precio)}</div>
            <div class="size">${r.envase ? r.envase.toUpperCase() : ''}</div>
          </div>
          ${incluyeHTML}
        </div>
      </article>
    `;
  }

  function render() {
    photos = loadPhotos();
    const premium = RECETAS.filter(r => r.cat === "premium");
    const mojitos = RECETAS.filter(r => r.cat === "mojitos");
    const coladas = RECETAS.filter(r => r.cat === "coladas");
    const daiquiris = RECETAS.filter(r => r.cat === "daiquiris");
    const sours = RECETAS.filter(r => r.cat === "sours");

    document.getElementById("hero-premium").innerHTML = premium.map(r => cardHTML(r, true)).join("");
    document.getElementById("grid-mojitos").innerHTML = mojitos.map(r => cardHTML(r)).join("");
    document.getElementById("grid-coladas").innerHTML = coladas.map(r => cardHTML(r)).join("");
    document.getElementById("grid-daiquiris").innerHTML = daiquiris.map(r => cardHTML(r)).join("");
    document.getElementById("grid-sours").innerHTML = sours.map(r => cardHTML(r)).join("");
  }

  // ===== INIT =====
  render();
</script>
